<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        button.class1 {
            background-color: #000000;
            border: none;
            color: white;
            padding: 13px 25px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 15px;
            cursor: pointer;
        }

        button.class2 {
            background-color: #55A35A;
            border: none;
            color: white;
            padding: 10px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
        }

        button.class3 {
            background-color: #F9DA4E;
            border: none;
            color: rgb(0, 0, 0);
            padding: 10px 60px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            margin: 4px 15px;
            cursor: pointer;
            border-radius: 30px;
            font-weight: medium;
            font-size: 18px;
        }

        button.class4 {
            background-color: #7353AD;
            border: none;
            color: rgb(255, 255, 255);
            padding: 15px 23px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            margin: 4px 20px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
            font-size: 18px;
        }

        button.class5 {
            background-color: #ffffff;
            border: #8d8d8d 1.5px solid;
            color: #8d8d8d;
            padding: 10px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            margin: 4px 1px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
        }

        button.class6 {
            background-color: #2D65BC;
            border: none;
            color: rgb(255, 255, 255);
            padding: 15px 23px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            margin: 4px 20px;
            cursor: pointer;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
        }

        button.class7 {
            background-color: #ffffff;
            border: #2D65BC 1.5px solid;
            color: #2D65BC;
            padding: 10px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            margin: 4px 1px;
            cursor: pointer;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <button class="class1">Request now</button>
    <button class="class2">Sign up</button>
    <button class="class3">Add to Cart</button>
    <p> </p>
    <button class="class4">Get Started</button>
    <button class="class5">Download</button>
    <button class="class6">Apply on company website</button>
    <button class="class7">Save</button>
</body>
